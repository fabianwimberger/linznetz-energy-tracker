<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Energy consumption analytics dashboard">
    <title>Energy Analytics Dashboard</title>
    <link rel="stylesheet" href="/static/vendor/flatpickr.min.css">
    <link rel="stylesheet" href="/static/vendor/dark.css">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <h1 class="header-title">
                <span class="header-icon">⚡</span>
                <span>Energy Analytics</span>
            </h1>
            <div class="status-badge">
                <span class="status-dot" aria-hidden="true"></span>
                <span class="status-text">Loading...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Chart Area -->
            <div class="content">
                <div class="card">
                    <div class="chart-container">
                        <canvas id="main-chart" role="img" aria-label="Energy consumption chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Sidebar Controls -->
            <aside class="sidebar">
                <!-- View Controls -->
                <section class="sidebar-section">
                    <h3 class="section-title">View Options</h3>

                    <div class="control-group">
                        <label class="control-label">Aggregation</label>
                        <div class="radio-grid">
                            <div class="radio-option">
                                <input type="radio" id="agg-raw" name="aggregation" value="raw">
                                <label for="agg-raw" class="radio-label">Raw</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="agg-daily" name="aggregation" value="daily" checked>
                                <label for="agg-daily" class="radio-label">Daily</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="agg-weekly" name="aggregation" value="weekly">
                                <label for="agg-weekly" class="radio-label">Weekly</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="agg-monthly" name="aggregation" value="monthly">
                                <label for="agg-monthly" class="radio-label">Monthly</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="agg-yearly" name="aggregation" value="yearly">
                                <label for="agg-yearly" class="radio-label">Yearly</label>
                            </div>
                        </div>
                    </div>

                    <div id="date-picker-container" class="control-group hidden">
                        <label for="date-picker" class="control-label">Select Date</label>
                        <input type="text" id="date-picker" class="date-input" placeholder="Choose date..." aria-label="Date selector">
                    </div>
                </section>

                <!-- Data Import -->
                <section class="sidebar-section">
                    <h3 class="section-title">Data Import</h3>

                    <form id="upload-form" class="upload-zone">
                        <div class="drop-area" id="upload-area">
                            <div class="upload-icon" aria-hidden="true">📊</div>
                            <div class="upload-title">Drop CSV files here</div>
                            <div class="upload-subtitle">or click to browse • Auto-imports on selection</div>
                            <input
                                type="file"
                                id="file-input"
                                name="file"
                                accept=".csv"
                                multiple
                                class="file-input"
                                aria-label="CSV file upload"
                            >
                        </div>

                        <button
                            type="button"
                            id="fetch-button"
                            class="fetch-button"
                            aria-label="Fetch latest data from LinzNetz portal"
                        >Fetch latest from LinzNetz</button>

                        <div id="upload-status" class="status-list" role="status" aria-live="polite"></div>
                    </form>
                </section>
            </aside>
        </main>
    </div>

    <script src="/static/vendor/chart.min.js"></script>
    <script src="/static/vendor/chartjs-plugin-zoom.min.js"></script>
    <script src="/static/vendor/flatpickr.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
