<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <circle cx="16" cy="16" r="15" fill="#1e293b" opacity="0.95"/>

  <!-- Spreadsheet / CSV grid -->
  <rect x="7.5" y="7" width="17" height="18" rx="1.2" fill="none" stroke="url(#gridGradient)" stroke-width="1.4"/>

  <!-- Header row -->
  <rect x="8" y="7.5" width="16" height="3.3" fill="url(#gridGradient)" opacity="0.85"/>

  <!-- Vertical column dividers -->
  <line x1="13.17" y1="10.8" x2="13.17" y2="24.5" stroke="#fbbf24" stroke-width="0.8" opacity="0.85"/>
  <line x1="18.83" y1="10.8" x2="18.83" y2="24.5" stroke="#fbbf24" stroke-width="0.8" opacity="0.85"/>

  <!-- Horizontal row dividers -->
  <line x1="8" y1="15.4" x2="24" y2="15.4" stroke="#fbbf24" stroke-width="0.8" opacity="0.85"/>
  <line x1="8" y1="19.95" x2="24" y2="19.95" stroke="#fbbf24" stroke-width="0.8" opacity="0.85"/>
</svg>
