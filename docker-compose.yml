services:
  app:
    image: ghcr.io/fabianwimberger/linznetz-energy-tracker:latest
    container_name: linznetz-energy-tracker
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - energy_data:/app/data
    environment:
      TZ: ${TZ:-Europe/Vienna}
      DATA_DIR: /app/data
      CORS_ORIGINS: ${CORS_ORIGINS:-*}

volumes:
  energy_data:
